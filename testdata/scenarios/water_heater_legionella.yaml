# Water Heater Legionella Scenario — reach 60°C once per day
name: water_heater_legionella
description: >
  Water heater must reach 60°C at least once for legionella prevention,
  while minimizing electricity cost. Classic reach_min_temp_once use case.
horizon_hours: 24
resolution_minutes: 15
days: 1
tags:
  - standard
  - water_heater

price_profile: default
price_params:
  base_price: 0.30
  peak_price: 0.45
  off_peak_price: 0.20

manifests:
  - ../manifests/simple_house/water_heater.json

constraint_windows:
  - window_id: legionella_cycle
    device_id: dhw
    deadline_offset_hours: 23.98
    requirement:
      type: reach_min_temp_once
      target_temp_c: 60.0
    priority_penalty: 10.0
  - window_id: wh_min_runtime
    device_id: dhw
    deadline_offset_hours: 23.98
    requirement:
      type: min_runtime_per_day
      min_hours: 2
    priority_penalty: 5.0
